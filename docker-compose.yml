version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: energy_sentinel_db
    environment:
      POSTGRES_USER: energy_user
      POSTGRES_PASSWORD: energy_pass
      POSTGRES_DB: energy_sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: energy_sentinel_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://energy_user:energy_pass@postgres:5432/energy_sentinel
      LOG_LEVEL: INFO
    depends_on:
      - postgres

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: energy_sentinel_dashboard
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data: